display_information:
  name: Slack Skill
  description: User-API access for the Slack skill (Claude/agents)
features:
  bot_user: null
oauth_config:
  scopes:
    user:
      - bookmarks:read
      - bookmarks:write
      - channels:history
      - channels:read
      - channels:write
      - chat:write
      - files:read
      - groups:history
      - groups:read
      - groups:write
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - mpim:write
      - pins:read
      - pins:write
      - reactions:read
      - reactions:write
      - search:read
      - stars:read
      - stars:write
      - users:read
      - users:read.email
      - users.profile:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
